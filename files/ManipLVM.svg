<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 460">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a26"/>
      <stop offset="1" stop-color="#0c1018"/>
    </linearGradient>
  </defs>
  <rect width="660" height="460" fill="url(#bg2)"/>
  <!-- reward loop -->
  <g fill="none" stroke="#46d4b1" stroke-width="10" stroke-linecap="round">
    <path d="M 470 120 a 95 95 0 1 1 -67 -91"/>
  </g>
  <polygon points="408,8 448,30 404,52" fill="#46d4b1"/>
  <text x="436" y="160" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#46d4b1">RL</text>
  <!-- robot arm -->
  <g stroke="#e8eef3" stroke-width="22" stroke-linecap="round" fill="none">
    <path d="M 120 400 L 120 300 L 230 210 L 360 240"/>
  </g>
  <g fill="#e8eef3">
    <circle cx="120" cy="300" r="20"/>
    <circle cx="230" cy="210" r="20"/>
  </g>
  <rect x="70" y="392" width="100" height="26" rx="10" fill="#e8eef3"/>
  <!-- gripper -->
  <g stroke="#f4b860" stroke-width="16" stroke-linecap="round" fill="none">
    <path d="M 360 240 l 52 -34"/>
    <path d="M 360 240 l 56 26"/>
  </g>
  <!-- target cube -->
  <g transform="translate(438,236)">
    <polygon points="0,22 44,0 88,22 44,44" fill="#c96f4a"/>
    <polygon points="0,22 44,44 44,96 0,72" fill="#a75b3e"/>
    <polygon points="88,22 44,44 44,96 88,72" fill="#8e4a32"/>
  </g>
  <!-- affordance ping -->
  <circle cx="482" cy="258" r="38" fill="none" stroke="#46d4b1" stroke-width="6" opacity=".75"/>
  <circle cx="482" cy="258" r="60" fill="none" stroke="#46d4b1" stroke-width="3" opacity=".35"/>
  <text x="40" y="404" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#d9f7ec" letter-spacing="6">MANIPLVM-R1</text>
  <text x="40" y="436" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#8fa3b3" letter-spacing="3">RL REASONING FOR EMBODIED MANIPULATION</text>
